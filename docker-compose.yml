version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://preciopartes:preciopartes@db:5432/preciopartes
      SECRET_KEY: ${SECRET_KEY:-preciopartes-dev-secret-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./etl:/app/etl      # Hot reload en dev
      - ./api:/app/api

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: preciopartes
      POSTGRES_PASSWORD: preciopartes
      POSTGRES_DB: preciopartes
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./api/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preciopartes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
